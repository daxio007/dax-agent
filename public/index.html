<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DAX Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">DX</div>
          <div>
            <div class="brand-title">DAX Agent</div>
            <div class="brand-subtitle" id="brandSubtitle">本地网关</div>
          </div>
        </div>
        <button class="primary-action" id="newSessionButton" type="button">新会话</button>
        <nav class="session-list" id="sessionList" aria-label="会话列表"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="sessionTitle">会话</h1>
            <div class="status-line" id="statusLine">正在检查网关...</div>
          </div>
          <div class="topbar-actions">
            <select class="language-select" id="languageInput" aria-label="界面语言">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
            <button class="ghost-button" id="exportButton" type="button">导出</button>
            <button class="ghost-button" id="refreshButton" type="button">刷新</button>
            <button class="ghost-button" id="settingsButton" type="button">设置</button>
          </div>
        </header>

        <section class="workspace">
          <section class="chat-panel" aria-label="聊天">
            <div class="messages" id="messages"></div>
            <details class="tool-drawer" id="toolDrawer">
              <summary>
                <span id="toolPanelTitle">工具运行</span>
                <span id="pendingCount">0 个待审批 · 共 0 条</span>
              </summary>
              <div class="tool-list" id="toolList"></div>
            </details>
            <form class="composer" id="composer">
              <textarea
                id="messageInput"
                rows="3"
                placeholder="询问 DAX Agent，或试试 /help"
                autocomplete="off"
              ></textarea>
              <button class="send-button" id="sendButton" type="submit">发送</button>
            </form>
          </section>
        </section>
      </main>
    </div>

    <dialog id="actionDialog" class="action-dialog">
      <div class="action-dialog-inner">
        <div class="dialog-head">
          <h2 id="actionDialogTitle">需要你确认</h2>
          <button class="icon-button" type="button" id="closeActionDialogButton" aria-label="关闭">x</button>
        </div>
        <p class="action-summary" id="actionDialogSummary"></p>
        <div class="action-risk" id="actionDialogRisk"></div>
        <div class="action-command-label" id="actionCommandLabel">建议命令</div>
        <pre class="action-command" id="actionDialogCommand"></pre>
        <div class="dialog-actions">
          <button class="ghost-button" type="button" id="customProposalButton">我自己输入</button>
          <button class="ghost-button" type="button" id="rejectProposalButton">暂不执行</button>
          <button class="primary-action compact" type="button" id="executeProposalButton">批准并执行</button>
        </div>
      </div>
    </dialog>

    <dialog id="settingsDialog" class="settings-dialog">
      <form method="dialog" class="settings-form" id="settingsForm">
        <div class="dialog-head">
          <h2 id="settingsTitle">设置</h2>
          <button class="icon-button" type="button" id="closeSettingsButton" aria-label="关闭">x</button>
        </div>
        <label>
          <span id="providerLabel">Provider</span>
          <select id="providerInput">
            <option value="echo">Echo</option>
            <option value="openai">OpenAI compatible</option>
            <option value="ollama">Ollama compatible</option>
          </select>
          <small class="field-help" id="providerHint"></small>
        </label>
        <label>
          <span id="baseUrlLabel">Base URL</span>
          <input id="baseUrlInput" type="url" placeholder="https://api.openai.com/v1" />
        </label>
        <label>
          <span id="modelLabel">Model</span>
          <input id="modelInput" type="text" placeholder="gpt-4.1" />
        </label>
        <label>
          <span id="apiKeyLabel">API key</span>
          <input
            id="apiKeyInput"
            type="password"
            placeholder="留空则保留当前密钥"
            autocomplete="new-password"
            spellcheck="false"
          />
          <small class="field-help" id="apiKeyStatus"></small>
        </label>
        <label class="checkbox-row">
          <input id="autoRunReadToolsInput" type="checkbox" />
          <span id="autoRunReadToolsLabel">自动运行只读工具</span>
        </label>
        <div class="settings-feedback" id="settingsFeedback" role="status" aria-live="polite"></div>
        <div class="dialog-actions">
          <button class="ghost-button" type="button" id="cancelSettingsButton">取消</button>
          <button class="ghost-button" type="button" id="testSettingsButton">测试连接</button>
          <button class="primary-action compact" id="saveSettingsButton" type="submit">保存设置</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
